version: "3.9"
services:
  db:
    image: postgres:16
    container_name: bomnous-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bomnous
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: bomnous-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bomnous
      SECRET_KEY: supersecretkeychangeinproduction
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data: